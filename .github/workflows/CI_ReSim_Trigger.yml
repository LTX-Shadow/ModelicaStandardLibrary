name: CI_ReSim_Trigger

on: pull_request_target

permissions:
  contents: read
  actions: write
  
env:
    EVENT_NUMBER:  ${{ github.event.client_payload.number }}
    BASE_SHA: ${{ github.event.client_payload.base_sha }}
    PR_SHA: ${{ github.event.client_payload.head_sha }}
    REPO_NAME: ${{ github.event.client_payload.github_repo }}
    
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.LTX_SIMULATION_TOKEN }}
          script: |
            const pr = context.payload.pull_request || {};
            await github.rest.repos.createDispatchEvent({
              owner: '${{ secrets.PRIVATE_CI_OWNER }}',
              repo: '${{ secrets.PRIVATE_CI_REPO }}',
              event_type: 'CI_trigger_type',
              client_payload: {
                number: context.payload.number,
                head_sha: pr.head?.sha ?? null,
                base_sha: pr.base?.sha ?? null,
                github_repo: context.repo.full_name 
              }
            });
      - name: echo envs
        run: |
          echo ${{ env.EVENT_NUMBER }}
          echo ${{ env.BASE_SHA }}
          echo ${{ env.PR_SHA }}
          echo ${{ env.REPO_NAME }}
