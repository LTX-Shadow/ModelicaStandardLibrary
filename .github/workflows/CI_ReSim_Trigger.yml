name: Sync_CI_Repo

on: pull_request

permissions:
  contents: read
  
jobs:
  run:
    runs-on: ubuntu-latest
    steps:

      - name: "Checkout Repository"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0
      - name: "Scan Repository"
        id: virus-scan
        uses: "hugoalh/scan-virus-ghaction@v0.20.1"
        with:
          git_ignores: |-
            Param($GitCommitMeta)
            Return (
              $GitCommit.AuthorName -imatch '^dependabot' -or
              ($GitCommit.AuthorDate -lt ([DateTime]::Parse('2022-01-01T00:00:00Z')) -and $GitCommit.AuthorName -imatch '^octocat$')
            )
          git_limit: 1
          

      - name: Get base and PR branch info
        id: pr-info
        run: |
          echo "PR_BRANCH=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          echo "BASE_BRANCH=${{ github.base_ref }}" >> $GITHUB_OUTPUT

      - name: Check for modified .c files
        id: check-c-changes
        run: |
          echo ${{ steps.pr-info.outputs.BASE_BRANCH }}
          echo ${{ steps.pr-info.outputs.PR_BRANCH }}
          git diff --name-only ${{ steps.pr-info.outputs.BASE_BRANCH }} ${{ steps.pr-info.outputs.PR_BRANCH }} > ./git_diff.txt
          echo $(cat ./git_diff.txt)
          # Compare current commit with base commit
          MODIFIED_C_FILES=$(cat ./git_diff.txt | grep '\.c$' || true)
          echo $MODIFIED_C_FILES
          if [ -z "$MODIFIED_C_FILES" ]; then
            echo "No .c files were modified"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Modified .c files:"
            echo "$MODIFIED_C_FILES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Check for secure-c-code label
        id: check-label
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const pr = pullRequests[0];
            const hasLabel = pr.labels.some(label => label.name === 'secure-c-code');
            core.setOutput('has_label', hasLabel);
          
      - uses: actions/github-script@v9
        if: steps.virus-scan.outcome == 'success' && ( steps.check-c-changes.outputs.has_changes == 'false' || steps.check-label.outputs.has_label == 'true')
        with:
          github-token: ${{ secrets.LTX_SIMULATION_TOKEN }}
          script: |
            const pr = context.payload.pull_request || {};
            await github.rest.repos.createDispatchEvent({
              owner: '${{ secrets.PRIVATE_CI_OWNER }}',
              repo: '${{ secrets.PRIVATE_CI_REPO }}',
              event_type: 'CI_trigger_type',
              client_payload: {
                number: context.payload.number,
                head_sha: pr.head?.sha ?? null,
                base_sha: pr.base?.sha ?? null,
                github_repo: context.repo.full_name 
              }
            });
